<!DOCTYPE html>
<html lang="hi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AK और UR Private Chat</title>
  <style>
    :root{
      --bg:#050505;--card:#101010;--card2:#181818;--text:#fff;--muted:#b8b8b8;--line:#2d2d2d;
      --mine:#fff;--mineText:#000;--their:#1f1f1f;--ok:#9cffb1;--bad:#ff9c9c;--warn:#ffd28a;
    }
    *{box-sizing:border-box}html,body{height:100%}
    body{margin:0;font-family:system-ui,-apple-system,Segoe UI,Roboto,Arial,sans-serif;color:var(--text);background:
      radial-gradient(circle at 10% 15%,rgba(255,255,255,.18),transparent 28%),
      radial-gradient(circle at 90% 20%,rgba(255,255,255,.10),transparent 28%),linear-gradient(135deg,#000,#111 48%,#000);overflow:hidden;font-size:12px}
    .hearts{position:fixed;inset:0;pointer-events:none;opacity:.14;z-index:0}.hearts:before,.hearts:after{content:"♡";position:absolute;font-size:12rem;color:#fff;animation:float 8s ease-in-out infinite}.hearts:before{left:-35px;top:20px;rotate:-16deg}.hearts:after{right:-35px;bottom:-35px;rotate:16deg;animation-delay:-3s}@keyframes float{50%{translate:0 -18px;opacity:.35}}
    .login,.app{position:relative;z-index:1}.login{min-height:100%;display:grid;place-items:center;padding:14px}.login-card{width:min(340px,100%);background:rgba(12,12,12,.9);border:1px solid var(--line);border-radius:22px;padding:22px;box-shadow:0 20px 70px rgba(255,255,255,.08);backdrop-filter:blur(14px)}
    .logo{text-align:center;font-size:42px;letter-spacing:6px}.title{text-align:center;font-size:20px;font-weight:900;margin:0}.sub{text-align:center;color:var(--muted);line-height:1.45;margin:8px 0 16px;font-size:11px}
    input,textarea,button{font:inherit;border-radius:13px;border:1px solid var(--line);outline:none}input,textarea{width:100%;background:#050505;color:#fff;padding:11px 12px;margin:6px 0}button{cursor:pointer;background:#fff;color:#000;border-color:#fff;padding:10px 12px;font-weight:900}button.secondary{background:#121212;color:#fff;border-color:#3a3a3a}button:disabled{opacity:.55;cursor:not-allowed}.err{min-height:18px;text-align:center;color:var(--bad);margin-top:8px}

    /* Half Chrome window friendly compact layout */
    .app{height:min(94vh,760px);display:none;grid-template-rows:auto 1fr auto;width:min(430px,100vw);margin:3vh auto;padding:8px}.topbar{display:flex;align-items:center;justify-content:space-between;gap:8px;background:rgba(10,10,10,.92);border:1px solid var(--line);border-radius:18px 18px 8px 8px;padding:9px 10px;backdrop-filter:blur(12px)}.who{font-weight:950;font-size:13px}.status{font-size:10px;color:var(--muted);margin-top:2px}.status.ok{color:var(--ok)}.status.bad{color:var(--bad)}.status.warn{color:var(--warn)}.actions{display:flex;gap:5px;flex-wrap:wrap;justify-content:flex-end}.actions button,.actions input{padding:7px 8px;border-radius:10px;font-size:10px;margin:0}.actions input{width:112px}
    .messages{overflow:auto;padding:10px 9px;background:rgba(255,255,255,.035);border-left:1px solid var(--line);border-right:1px solid var(--line);scroll-behavior:smooth;position:relative}.empty{text-align:center;color:var(--muted);line-height:1.55;margin-top:20vh}.newCount{position:sticky;top:0;z-index:2;margin:0 auto 8px;width:max-content;background:#fff;color:#000;border-radius:999px;padding:4px 10px;font-size:10px;font-weight:900;box-shadow:0 8px 24px rgba(0,0,0,.35)}
    details.msgGroup{max-width:82%;margin:8px 0}.msgGroup.mine{margin-left:auto}.msgGroup summary{list-style:none;cursor:pointer;user-select:none;font-size:10px;color:var(--muted);margin-bottom:4px;padding:0 4px}.msgGroup summary::-webkit-details-marker{display:none}.msgGroup.mine summary{text-align:right}.senderName{font-weight:900;color:#fff}.groupCount{opacity:.8}.msg{display:flex;flex-direction:column;gap:3px;margin:5px 0}.msg.mine{align-items:flex-end}.bubble{padding:8px 10px;border-radius:15px;line-height:1.35;white-space:pre-wrap;word-break:break-word;box-shadow:0 6px 18px rgba(0,0,0,.25);font-size:11px}.mine .bubble{background:var(--mine);color:var(--mineText);border-bottom-right-radius:4px}.theirs .bubble{background:var(--their);border:1px solid #303030;border-bottom-left-radius:4px}.meta{font-size:9px;color:var(--muted);padding:0 4px}.bubble img{display:block;max-width:190px;border-radius:11px;margin-top:6px}audio{width:190px;max-width:100%;margin-top:6px}
    .composer{background:rgba(10,10,10,.94);border:1px solid var(--line);border-radius:8px 8px 18px 18px;padding:8px;display:grid;gap:7px;backdrop-filter:blur(12px)}textarea{min-height:43px;max-height:110px;resize:vertical;margin:0;font-size:11px;line-height:1.35}.row{display:flex;gap:5px;align-items:center;flex-wrap:wrap}.grow{flex:1}.tool{width:auto;min-width:36px;padding:8px;border-radius:11px}.send{min-width:78px}.hint{font-size:10px;color:var(--muted)}.fileName{color:#fff}.emoji-panel{display:none;max-height:125px;overflow:auto;padding:7px;border:1px solid var(--line);border-radius:13px;background:#080808}.emoji-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:6px;color:var(--muted);font-size:10px}.emoji-close{padding:4px 8px!important;min-width:auto!important;border-radius:9px!important}.emoji-list button{background:#151515;color:#fff;border-color:#282828;margin:2px;padding:5px;min-width:28px;border-radius:8px;font-size:13px}
    .setup{display:none;background:#150b0b;border:1px solid #613333;color:#ffdede;border-radius:12px;padding:9px;font-size:10px;line-height:1.4}.setup b{color:#fff}
    @media(max-width:460px){.app{height:100%;width:100%;margin:0;padding:0}.topbar,.composer{border-radius:0}.bubble img{max-width:170px}.actions button,.actions input{font-size:9px}.login-card{padding:20px}}

    .profileWrap{display:flex;align-items:center;gap:8px}.avatar{width:34px;height:34px;border-radius:50%;object-fit:cover;border:2px solid #fff;background:#1a1a1a;box-shadow:0 0 12px rgba(255,255,255,.18)}.profileBtn{position:relative;overflow:hidden}.profileBtn input{display:none}.heartBurst{position:fixed;inset:0;pointer-events:none;z-index:9999;overflow:hidden}.heartParticle{position:absolute;font-size:18px;animation:heartPop 1.6s ease-out forwards;filter:drop-shadow(0 4px 8px rgba(0,0,0,.35))}@keyframes heartPop{0%{transform:translate(-50%,-50%) scale(.2);opacity:0}15%{opacity:1}100%{transform:translate(var(--x),var(--y)) scale(1.4) rotate(var(--r));opacity:0}}
    .login-card button:hover{box-shadow:0 0 28px rgba(255,105,180,.75),0 0 55px rgba(255,0,90,.35);transform:translateY(-1px)}.login-card button{transition:.22s ease}.loveRain{position:absolute;inset:0;pointer-events:none;overflow:hidden;border-radius:15px}.loveDrop{position:absolute;top:-12px;font-size:12px;animation:loveFall 10s linear forwards;opacity:.95}@keyframes loveFall{to{transform:translateY(78px) rotate(360deg);opacity:0}}
    .msg.mine{align-items:flex-start}.msgGroup.mine{margin-left:0;margin-right:auto}.msgGroup.mine summary{text-align:left}.mine .bubble{border-bottom-right-radius:15px;border-bottom-left-radius:4px;position:relative}.their .bubble{position:relative}.sticker-panel{display:none;max-height:150px;overflow:auto;padding:7px;border:1px solid var(--line);border-radius:13px;background:#080808}.sticker-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:6px;color:var(--muted);font-size:10px}.sticker-list button{background:#151515;color:#fff;border-color:#282828;margin:3px;padding:7px 8px;min-width:58px;border-radius:10px;font-size:20px}.stickerText{font-size:26px;line-height:1.2}.loveQuick{font-size:10px;color:#ffd6e8;margin-left:4px}

  </style>
</head>
<body>
  <div class="hearts"></div>

  <section class="login" id="loginScreen">
    <div class="login-card">
      <div class="logo">♡♡</div>
      <h1 class="title">AK और UR Chat</h1>
      <div class="sub">Private black & white romantic chat<br>Username: <b>AK</b> या <b>UR</b><br>Password: AK=<b>2006</b>, UR=<b>2810</b></div>
      <input id="username" placeholder="Username: AK या UR" autocomplete="username" onkeydown="loginOnEnter(event)" />
      <input id="password" type="password" placeholder="Password" autocomplete="current-password" onkeydown="loginOnEnter(event)" />
      <button style="width:100%;margin-top:8px" onclick="login()">Login ♡</button>
      <div class="err" id="loginErr"></div>
    </div>
  </section>

  <main class="app" id="app">
    <header class="topbar">
      <div class="profileWrap">
        <img id="myAvatar" class="avatar" alt="profile" />
        <div>
          <div class="who">♡ <span id="me"></span> की Chat</div>
          <div class="status" id="netStatus">Starting...</div>
        </div>
      </div>
      <div class="actions">
        <label class="secondary profileBtn" style="cursor:pointer;padding:7px 8px;border-radius:10px;font-size:10px">Profile 📷<input id="profileInput" type="file" accept="image/*" onchange="updateProfilePic(event)" /></label>
        <input type="date" id="chatDate" onchange="watchMessages()" />
        <button class="secondary" onclick="manualClear()">Clear</button>
        <button class="secondary" onclick="logout()">Logout</button>
      </div>
    </header>

    <section class="messages" id="messages"></section>

    <footer class="composer">
      <div class="setup" id="setupBox">
        <b>Firebase config missing.</b> Same phone पर test चलेगा, लेकिन दूसरे phone पर messages भेजने के लिए code में <b>firebaseConfig</b> की real values paste करनी होंगी.
      </div>
      <div class="emoji-panel" id="emojiPanel"></div>
      <div class="sticker-panel" id="stickerPanel"></div>
      <textarea id="text" maxlength="5000" placeholder="Message लिखें... Enter = Send, Shift+Enter = New line"></textarea>
      <div class="row">
        <button class="tool secondary" onclick="toggleEmoji()">😊</button>
        <button class="tool secondary" onclick="toggleStickers()">💌</button>
        <label class="tool secondary" style="cursor:pointer;text-align:center">🖼️<input id="imageInput" type="file" accept="image/*" hidden onchange="pickImage(event)" /></label>
        <button id="voiceBtn" class="tool secondary" onclick="toggleRecording()">🎙️</button>
        <span class="hint grow"><span id="count">0</span>/5000 <span id="picked" class="fileName"></span></span>
        <button class="send" id="sendBtn" onclick="sendMessage()">Send</button>
      </div>
    </footer>
  </main>

  <script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-database-compat.js"></script>
  <script>
    const firebaseConfig = {
      apiKey: "AIzaSyBqBTppcUnoODy2uY3JaYZZ9DVjzADJRQ4",
      authDomain: "akaur-e7f57.firebaseapp.com",
      databaseURL: "https://akaur-e7f57-default-rtdb.firebaseio.com",
      projectId: "akaur-e7f57",
      storageBucket: "akaur-e7f57.firebasestorage.app",
      messagingSenderId: "970506787698",
      appId: "1:970506787698:web:18fd5ae92be7e230fe5beb"
    };

    const USERS = { AK:"2006", UR:"2810" };
    let currentUser = sessionStorage.getItem("akUrUser") || "";
    if(currentUser === "AKA") currentUser = "AK";
    let db = null, firebaseOK = false, currentRef = null, currentListener = null, lastMsgTotal = 0;
    let imageData = "", audioData = "", mediaRecorder = null, audioChunks = [];
    const emojis = "❤️ 💖 💗 💓 💞 💕 💘 💝 💟 ❣️ 💋 💌 🌹 🥰 😍 😘 🫶 💑 💏 👩‍❤️‍👨 💐 ✨ 😀 😃 😄 😁 😆 😂 🤣 😊 😍 🥰 😘 😗 😙 😚 😉 😌 🤗 🤭 😋 😜 🤪 😝 😎 🥳 🥺 😢 😭 😡 😴 ❤️ 🧡 💛 💚 💙 💜 🤎 🖤 🤍 💘 💝 💖 💗 💓 💞 💕 💟 ❣️ 💔 💋 💌 🌹 🥀 🌺 🌸 🌼 🌻 ⭐ 🌙 ☀️ 🌈 🔥 ✨ 🎉 🎊 🎁 👋 👍 👎 🙏 👏 🙌 🤝 💪 👀 👄 👩‍❤️‍👨 💏 💑 🐦 🕊️ 🦢 🍫 🎂 ☕ 🍕 📱 🎵 🎶 🎧".split(/\s+/);

    const loveStickers = ["❤️ I Love You ❤️", "💖 Love You जान 💖", "🥰 Miss You 🥰", "😘 Kiss 😘", "🌹 For You 🌹", "💞 Forever 💞", "💌 પ્રેમ 💌", "❤️ હું તને પ્રેમ કરું છું ❤️", "💖 મિસ યુ 💖", "🌹 મારા દિલમાં તું 🌹", "💘 आई लव यू 💘", "💞 मेरी जान 💞", "💕 तुम खास हो 💕", "💝 Only You 💝", "💓 Dil Se Love 💓", "💑 AK♡UR 💑", "🫶 Love Love 🫶", "💋 Sweet Kiss 💋", "💐 मेरी मोहब्बत 💐", "✨ Full Love ✨"];

    function today(){ return new Date().toISOString().slice(0,10); }
    function path(){ return "akaUrChat/" + document.getElementById("chatDate").value; }
    function setStatus(text, cls){ const s=document.getElementById("netStatus"); s.textContent=text; s.className="status " + (cls||""); }
    function escapeHtml(s){ return String(s).replace(/[&<>"']/g, c => ({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#039;"}[c])); }
    function isFirebaseFilled(){ return firebaseConfig.apiKey && !firebaseConfig.apiKey.includes("PASTE_") && firebaseConfig.databaseURL && firebaseConfig.databaseURL.includes("firebaseio.com") && !firebaseConfig.databaseURL.includes("PASTE_"); }

    function initFirebase(){
      if(!isFirebaseFilled()){
        firebaseOK = false; setStatus("Offline test mode", "warn"); document.getElementById("setupBox").style.display = "block"; return;
      }
      try{ firebase.initializeApp(firebaseConfig); db = firebase.database(); firebaseOK = true; setStatus("Online sync ready ✓", "ok"); }
      catch(e){ firebaseOK = false; setStatus("Firebase config error", "bad"); console.error(e); }
    }

    function init(){
      document.getElementById("chatDate").value = today();
      document.getElementById("emojiPanel").innerHTML = `<div class="emoji-head"><b>Love Emoji</b><button class="secondary emoji-close" onclick="closeEmoji()">Close ✕</button></div><div class="emoji-list">${emojis.map(e => `<button onclick="addEmoji('${e}')">${e}</button>`).join("")}</div>`;
      document.getElementById("stickerPanel").innerHTML = `<div class="sticker-head"><b>Love Stickers / स्टिकर / સ્ટિકર</b><button class="secondary emoji-close" onclick="closeStickers()">Close ✕</button></div><div class="sticker-list">${loveStickers.map(st => `<button onclick="sendSticker('${st.replace(/'/g,"\\'")}')">${st}</button>`).join("")}</div>`;
      const textEl = document.getElementById("text");
      textEl.addEventListener("input", e => document.getElementById("count").textContent = e.target.value.length);
      textEl.addEventListener("keydown", e => { if(e.key === "Enter" && !e.shiftKey){ e.preventDefault(); sendMessage(); } });
      initFirebase(); if(currentUser && USERS[currentUser]) showApp();
      setInterval(() => { if(document.getElementById("chatDate").value !== today()){ document.getElementById("chatDate").value = today(); watchMessages(); } }, 60000);
      setInterval(autoClear, 60000);
    }

    function login(){
      const u = document.getElementById("username").value.trim().toUpperCase();
      const p = document.getElementById("password").value.trim();
      if(USERS[u] && USERS[u] === p){ currentUser = u; sessionStorage.setItem("akUrUser", u); heartBlast(); setTimeout(showApp, 420); }
      else document.getElementById("loginErr").textContent = "गलत username या password";
    }
    function showApp(){ document.getElementById("loginScreen").style.display="none"; document.getElementById("app").style.display="grid"; document.getElementById("me").textContent=currentUser; loadProfilePic(); watchMessages(); }
    function logout(){ sessionStorage.removeItem("akUrUser"); sessionStorage.removeItem("akaUrUser"); location.reload(); }

    function localKey(){ return path() + "/messages"; }
    function getLocalMessages(){ try{return JSON.parse(localStorage.getItem(localKey()) || "[]");}catch(e){return [];} }
    function setLocalMessages(arr){ localStorage.setItem(localKey(), JSON.stringify(arr)); }

    function watchMessages(){
      const box = document.getElementById("messages");
      if(!firebaseOK){ renderMessages(getLocalMessages()); return; }
      if(currentRef && currentListener) currentRef.off("value", currentListener);
      currentRef = db.ref(path()+"/messages");
      currentListener = snap => {
        const val = snap.val() || {};
        const msgs = Object.entries(val).map(([id,m]) => ({id,...m,user:m.user === "AKA" ? "AK" : m.user})).sort((a,b)=>(a.time||0)-(b.time||0));
        renderMessages(msgs);
      };
      currentRef.on("value", currentListener, err => { setStatus("Database rules/config error", "bad"); box.innerHTML='<div class="empty">Firebase Database rules check करें.</div>'; console.error(err); });
    }

    function groupMessages(msgs){
      const groups = [];
      msgs.forEach(m => {
        const last = groups[groups.length - 1];
        if(last && last.user === m.user) last.items.push(m); else groups.push({user:m.user, items:[m]});
      });
      return groups;
    }

    function renderMessages(msgs){
      const box = document.getElementById("messages");
      const wasNearBottom = box.scrollHeight - box.scrollTop - box.clientHeight < 80;
      if(!msgs.length){ lastMsgTotal = 0; box.innerHTML = '<div class="empty">♡ अभी कोई मैसेज नहीं है<br>पहला मैसेज भेजें...</div>'; return; }
      const newCount = Math.max(0, msgs.length - lastMsgTotal);
      const countHtml = newCount > 0 && lastMsgTotal > 0 ? `<div class="newCount">${newCount} new message${newCount>1?'s':''} ↓</div>` : "";
      box.innerHTML = countHtml + groupMessages(msgs).map(g => {
        const mine = g.user === currentUser;
        const lastTime = g.items[g.items.length-1].time || Date.now();
        const body = g.items.map(m => {
          let content = "";
          if(m.text) content += escapeHtml(m.text);
          if(m.image) content += `<img src="${m.image}" alt="sent image">`;
          if(m.audio) content += `<audio controls src="${m.audio}"></audio>`;
          if(m.sticker) content += `<div class="stickerText">${escapeHtml(m.sticker)}</div>`;
          const rain = (mine && Date.now() - (m.time||0) < 10000) ? `<div class="loveRain">${Array.from({length:22}).map((_,i)=>`<span class="loveDrop" style="left:${Math.random()*92}%;animation-delay:${Math.random()*1.2}s">${['❤️','💕','💖','💘','💞'][i%5]}</span>`).join("")}</div>` : "";
          return `<div class="msg ${mine?'mine':'theirs'}"><div class="bubble">${content}${rain}</div><div class="meta">${new Date(m.time||Date.now()).toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'})}</div></div>`;
        }).join("");
        return `<details class="msgGroup ${mine?'mine':'theirs'}" open><summary><span class="senderName">${escapeHtml(g.user||'')}</span> <span class="groupCount">(${g.items.length}) • ${new Date(lastTime).toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'})}</span></summary>${body}</details>`;
      }).join("");
      if(wasNearBottom || newCount) box.scrollTop = box.scrollHeight;
      lastMsgTotal = msgs.length;
    }

    async function sendMessage(){
      const textEl = document.getElementById("text");
      const text = textEl.value.trim();
      if(!text && !imageData && !audioData) return;
      const msg = {user:currentUser, text, image:imageData, audio:audioData, time:Date.now()};
      document.getElementById("sendBtn").disabled = true;
      try{
        if(firebaseOK) await db.ref(path()+"/messages").push(msg);
        else { const arr = getLocalMessages(); arr.push({...msg,id:String(Date.now())}); setLocalMessages(arr); renderMessages(arr); }
        textEl.value=""; document.getElementById("count").textContent="0"; imageData=""; audioData=""; document.getElementById("picked").textContent=""; document.getElementById("imageInput").value="";
      }catch(e){ alert("Message send नहीं हुआ. Firebase config/rules check करें."); console.error(e); }
      finally{ document.getElementById("sendBtn").disabled = false; textEl.focus(); }
    }

    async function manualClear(){
      if(!confirm("इस date की chat clear करनी है?")) return;
      if(firebaseOK) await db.ref(path()).remove(); else { localStorage.removeItem(localKey()); renderMessages([]); }
    }
    async function autoClear(){
      if(!firebaseOK) return;
      const meta = db.ref("akaUrChatMeta/lastClear"); const snap = await meta.get(); const last = Number(snap.val() || 0);
      if(Date.now() - last >= 30*60*1000){ await db.ref("akaUrChat/" + today()).remove(); await meta.set(Date.now()); }
    }
    function toggleEmoji(){ const p=document.getElementById("emojiPanel"); p.style.display = p.style.display === "block" ? "none" : "block"; }
    function closeEmoji(){ document.getElementById("emojiPanel").style.display = "none"; }
    function addEmoji(e){ const t=document.getElementById("text"); t.value += e; t.focus(); document.getElementById("count").textContent = t.value.length; }
    function pickImage(ev){
      const f = ev.target.files[0]; if(!f) return;
      if(f.size > 900000){ alert("Image 900KB से कम रखें."); ev.target.value=""; return; }
      const r = new FileReader(); r.onload = () => { imageData = r.result; document.getElementById("picked").textContent = "Image ready ✓"; }; r.readAsDataURL(f);
    }
    async function toggleRecording(){
      const btn = document.getElementById("voiceBtn");
      if(mediaRecorder && mediaRecorder.state === "recording"){ mediaRecorder.stop(); btn.textContent="🎙️"; return; }
      try{
        const stream = await navigator.mediaDevices.getUserMedia({audio:true}); audioChunks=[]; mediaRecorder = new MediaRecorder(stream);
        mediaRecorder.ondataavailable = e => audioChunks.push(e.data);
        mediaRecorder.onstop = () => {
          const blob = new Blob(audioChunks, {type:"audio/webm"});
          if(blob.size > 900000){ alert("Voice छोटा रखें, 900KB से कम."); stream.getTracks().forEach(t=>t.stop()); return; }
          const r = new FileReader(); r.onload = () => { audioData = r.result; document.getElementById("picked").textContent = "Voice ready ✓"; }; r.readAsDataURL(blob);
          stream.getTracks().forEach(t=>t.stop());
        };
        mediaRecorder.start(); btn.textContent="⏹️";
      }catch(e){ alert("Mic permission allow करें. Recording HTTPS पर चलेगी."); }
    }

    function loginOnEnter(e){ if(e.key === "Enter"){ e.preventDefault(); login(); } }
    function heartBlast(){
      const wrap = document.createElement("div"); wrap.className = "heartBurst"; document.body.appendChild(wrap);
      const icons = ["❤️","💖","💕","💘","💝","💞","🌹","💋"];
      for(let i=0;i<48;i++){
        const sp = document.createElement("span"); sp.className = "heartParticle"; sp.textContent = icons[i%icons.length];
        sp.style.left = "50%"; sp.style.top = "50%";
        sp.style.setProperty("--x", (Math.random()*760-380)+"px");
        sp.style.setProperty("--y", (Math.random()*520-260)+"px");
        sp.style.setProperty("--r", (Math.random()*720-360)+"deg");
        sp.style.animationDelay = (Math.random()*.18)+"s"; wrap.appendChild(sp);
      }
      setTimeout(()=>wrap.remove(), 2100);
    }
    function profileKey(){ return "akUrProfile_" + currentUser; }
    function loadProfilePic(){ const img=document.getElementById("myAvatar"); const saved=localStorage.getItem(profileKey()); img.src = saved || "data:image/svg+xml;utf8," + encodeURIComponent(`<svg xmlns='http://www.w3.org/2000/svg' width='80' height='80'><rect width='100%' height='100%' fill='black'/><text x='50%' y='56%' font-size='34' fill='white' text-anchor='middle' font-family='Arial'>${currentUser||'♡'}</text></svg>`); }
    function updateProfilePic(ev){ const f=ev.target.files[0]; if(!f) return; if(f.size>900000){ alert("Profile photo 900KB से कम रखें."); ev.target.value=""; return; } const r=new FileReader(); r.onload=()=>{ localStorage.setItem(profileKey(), r.result); loadProfilePic(); heartBlast(); }; r.readAsDataURL(f); }
    function toggleStickers(){ const p=document.getElementById("stickerPanel"); p.style.display = p.style.display === "block" ? "none" : "block"; }
    function closeStickers(){ document.getElementById("stickerPanel").style.display = "none"; }
    async function sendSticker(st){
      const msg = {user:currentUser, text:"", sticker:st, image:"", audio:"", time:Date.now()};
      try{ if(firebaseOK) await db.ref(path()+"/messages").push(msg); else { const arr=getLocalMessages(); arr.push({...msg,id:String(Date.now())}); setLocalMessages(arr); renderMessages(arr); } heartBlast(); closeStickers(); }
      catch(e){ alert("Sticker send नहीं हुआ. Firebase config/rules check करें."); console.error(e); }
    }

    init();
  </script>
</body>
</html>
