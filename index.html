<!DOCTYPE html>
<html lang="hi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AKA और UR Private Chat</title>
  <style>
    :root{
      --bg:#050505;--card:#101010;--card2:#181818;--text:#fff;--muted:#b8b8b8;--line:#2d2d2d;
      --mine:#fff;--mineText:#000;--their:#1f1f1f;--ok:#9cffb1;--bad:#ff9c9c;--warn:#ffd28a;
    }
    *{box-sizing:border-box}html,body{height:100%}
    body{margin:0;font-family:system-ui,-apple-system,Segoe UI,Roboto,Arial,sans-serif;color:var(--text);background:
      radial-gradient(circle at 10% 15%,rgba(255,255,255,.18),transparent 28%),
      radial-gradient(circle at 90% 20%,rgba(255,255,255,.10),transparent 28%),linear-gradient(135deg,#000,#111 48%,#000);overflow:hidden}
    .hearts{position:fixed;inset:0;pointer-events:none;opacity:.18;z-index:0}.hearts:before,.hearts:after{content:"♡";position:absolute;font-size:17rem;color:#fff;animation:float 8s ease-in-out infinite}.hearts:before{left:-35px;top:20px;rotate:-16deg}.hearts:after{right:-35px;bottom:-35px;rotate:16deg;animation-delay:-3s}@keyframes float{50%{translate:0 -18px;opacity:.4}}
    .login,.app{position:relative;z-index:1}.login{min-height:100%;display:grid;place-items:center;padding:22px}.login-card{width:min(440px,100%);background:rgba(12,12,12,.88);border:1px solid var(--line);border-radius:28px;padding:30px;box-shadow:0 20px 70px rgba(255,255,255,.08);backdrop-filter:blur(14px)}
    .logo{text-align:center;font-size:58px;letter-spacing:8px}.title{text-align:center;font-size:27px;font-weight:900;margin:0}.sub{text-align:center;color:var(--muted);line-height:1.55;margin:10px 0 22px}
    input,textarea,button{font:inherit;border-radius:16px;border:1px solid var(--line);outline:none}input,textarea{width:100%;background:#050505;color:#fff;padding:15px 16px;margin:8px 0}button{cursor:pointer;background:#fff;color:#000;border-color:#fff;padding:13px 16px;font-weight:900}button.secondary{background:#121212;color:#fff;border-color:#3a3a3a}button:disabled{opacity:.55;cursor:not-allowed}.err{min-height:22px;text-align:center;color:var(--bad);margin-top:10px}
    .app{height:100%;display:none;grid-template-rows:auto 1fr auto;max-width:980px;margin:0 auto;padding:12px}.topbar{display:flex;align-items:center;justify-content:space-between;gap:10px;background:rgba(10,10,10,.92);border:1px solid var(--line);border-radius:22px 22px 10px 10px;padding:13px 15px;backdrop-filter:blur(12px)}.who{font-weight:950}.status{font-size:13px;color:var(--muted);margin-top:3px}.status.ok{color:var(--ok)}.status.bad{color:var(--bad)}.status.warn{color:var(--warn)}.actions{display:flex;gap:8px;flex-wrap:wrap;justify-content:flex-end}.actions button,.actions input{padding:9px 10px;border-radius:12px;font-size:13px;margin:0}.actions input{width:145px}
    .messages{overflow:auto;padding:17px;background:rgba(255,255,255,.035);border-left:1px solid var(--line);border-right:1px solid var(--line);scroll-behavior:smooth}.empty{text-align:center;color:var(--muted);line-height:1.7;margin-top:22vh}.msg{max-width:76%;display:flex;flex-direction:column;gap:5px;margin:10px 0}.msg.mine{margin-left:auto;align-items:flex-end}.bubble{padding:12px 14px;border-radius:20px;line-height:1.45;white-space:pre-wrap;word-break:break-word;box-shadow:0 8px 24px rgba(0,0,0,.25)}.mine .bubble{background:var(--mine);color:var(--mineText);border-bottom-right-radius:5px}.theirs .bubble{background:var(--their);border:1px solid #303030;border-bottom-left-radius:5px}.meta{font-size:11px;color:var(--muted);padding:0 6px}.bubble img{display:block;max-width:260px;border-radius:14px;margin-top:8px}audio{width:260px;max-width:100%;margin-top:8px}
    .composer{background:rgba(10,10,10,.94);border:1px solid var(--line);border-radius:10px 10px 22px 22px;padding:12px;display:grid;gap:10px;backdrop-filter:blur(12px)}textarea{min-height:76px;max-height:190px;resize:vertical;margin:0}.row{display:flex;gap:8px;align-items:center;flex-wrap:wrap}.grow{flex:1}.tool{width:auto;min-width:45px;padding:12px;border-radius:14px}.send{min-width:120px}.hint{font-size:12px;color:var(--muted)}.fileName{color:#fff}.emoji-panel{display:none;max-height:165px;overflow:auto;padding:9px;border:1px solid var(--line);border-radius:16px;background:#080808}.emoji-panel button{background:#151515;color:#fff;border-color:#282828;margin:3px;padding:7px;min-width:34px;border-radius:10px}
    .setup{display:none;background:#150b0b;border:1px solid #613333;color:#ffdede;border-radius:16px;padding:12px;font-size:13px;line-height:1.45}.setup b{color:#fff}
    @media(max-width:650px){.app{padding:0}.topbar,.composer{border-radius:0}.msg{max-width:90%}.bubble img{max-width:210px}.actions button,.actions input{font-size:12px}.login-card{padding:24px}}
  </style>
</head>
<body>
  <div class="hearts"></div>

  <section class="login" id="loginScreen">
    <div class="login-card">
      <div class="logo">♡♡</div>
      <h1 class="title">AKA और UR Chat</h1>
      <div class="sub">Private black & white romantic chat<br>Username: <b>AKA</b> या <b>UR</b> | Password: <b>12345</b></div>
      <input id="username" placeholder="Username: AKA या UR" autocomplete="username" />
      <input id="password" type="password" placeholder="Password" autocomplete="current-password" />
      <button style="width:100%;margin-top:10px" onclick="login()">Login ♡</button>
      <div class="err" id="loginErr"></div>
    </div>
  </section>

  <main class="app" id="app">
    <header class="topbar">
      <div>
        <div class="who">♡ <span id="me"></span> की Chat</div>
        <div class="status" id="netStatus">Starting...</div>
      </div>
      <div class="actions">
        <input type="date" id="chatDate" onchange="watchMessages()" />
        <button class="secondary" onclick="manualClear()">Clear</button>
        <button class="secondary" onclick="logout()">Logout</button>
      </div>
    </header>

    <section class="messages" id="messages"></section>

    <footer class="composer">
      <div class="setup" id="setupBox">
        <b>Firebase config missing.</b> Same phone पर test चलेगा, लेकिन दूसरे phone पर messages भेजने के लिए नीचे code में <b>firebaseConfig</b> की real values paste करनी होंगी.
      </div>
      <div class="emoji-panel" id="emojiPanel"></div>
      <textarea id="text" maxlength="5000" placeholder="अपना मैसेज लिखें..."></textarea>
      <div class="row">
        <button class="tool secondary" onclick="toggleEmoji()">😊</button>
        <label class="tool secondary" style="cursor:pointer;text-align:center">🖼️<input id="imageInput" type="file" accept="image/*" hidden onchange="pickImage(event)" /></label>
        <button id="voiceBtn" class="tool secondary" onclick="toggleRecording()">🎙️</button>
        <span class="hint grow"><span id="count">0</span>/5000 <span id="picked" class="fileName"></span></span>
        <button class="send" id="sendBtn" onclick="sendMessage()">Send ♡</button>
      </div>
    </footer>
  </main>

  <script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-database-compat.js"></script>
  <script>
    /************************************************************
     * FIREBASE CONFIG
     * Firebase Console > Project Settings > Your apps > Web app
     * यहाँ अपनी real config paste करें. अभी placeholders हैं.
     ************************************************************/
    const firebaseConfig = {
      apiKey: "PASTE_YOUR_API_KEY",
      authDomain: "PASTE_YOUR_PROJECT.firebaseapp.com",
      databaseURL: "https://PASTE_YOUR_PROJECT-default-rtdb.firebaseio.com",
      projectId: "PASTE_YOUR_PROJECT",
      storageBucket: "PASTE_YOUR_PROJECT.appspot.com",
      messagingSenderId: "PASTE_SENDER_ID",
      appId: "PASTE_APP_ID"
    };

    const USERS = { AKA:"12345", UR:"12345" };
    let currentUser = sessionStorage.getItem("akaUrUser") || "";
    let db = null, firebaseOK = false, currentRef = null, currentListener = null;
    let imageData = "", audioData = "", mediaRecorder = null, audioChunks = [];
    const emojis = "😀 😃 😄 😁 😆 😂 🤣 😊 😍 🥰 😘 😗 😙 😚 😉 😌 🤗 🤭 😋 😜 🤪 😝 😎 🥳 🥺 😢 😭 😡 😴 ❤️ 🧡 💛 💚 💙 💜 🤎 🖤 🤍 💘 💝 💖 💗 💓 💞 💕 💟 ❣️ 💔 💋 💌 🌹 🥀 🌺 🌸 🌼 🌻 ⭐ 🌙 ☀️ 🌈 🔥 ✨ 🎉 🎊 🎁 👋 👍 👎 🙏 👏 🙌 🤝 💪 👀 👄 👩‍❤️‍👨 💏 💑 🐦 🕊️ 🦢 🍫 🎂 ☕ 🍕 📱 🎵 🎶 🎧".split(/\s+/);

    function today(){ return new Date().toISOString().slice(0,10); }
    function path(){ return "akaUrChat/" + document.getElementById("chatDate").value; }
    function setStatus(text, cls){ const s=document.getElementById("netStatus"); s.textContent=text; s.className="status " + (cls||""); }
    function escapeHtml(s){ return String(s).replace(/[&<>"']/g, c => ({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#039;"}[c])); }
    function isFirebaseFilled(){ return firebaseConfig.apiKey && !firebaseConfig.apiKey.includes("PASTE_") && firebaseConfig.databaseURL && firebaseConfig.databaseURL.includes("firebaseio.com") && !firebaseConfig.databaseURL.includes("PASTE_"); }

    function initFirebase(){
      if(!isFirebaseFilled()){
        firebaseOK = false;
        setStatus("Offline test mode: Firebase config missing", "warn");
        document.getElementById("setupBox").style.display = "block";
        return;
      }
      try{
        firebase.initializeApp(firebaseConfig);
        db = firebase.database();
        firebaseOK = true;
        setStatus("Online sync ready ✓", "ok");
      }catch(e){
        firebaseOK = false;
        setStatus("Firebase config error", "bad");
        console.error(e);
      }
    }

    function init(){
      document.getElementById("chatDate").value = today();
      document.getElementById("emojiPanel").innerHTML = emojis.map(e => `<button onclick="addEmoji('${e}')">${e}</button>`).join("");
      document.getElementById("text").addEventListener("input", e => document.getElementById("count").textContent = e.target.value.length);
      initFirebase();
      if(currentUser) showApp();
      setInterval(() => { if(document.getElementById("chatDate").value !== today()){ document.getElementById("chatDate").value = today(); watchMessages(); } }, 60000);
      setInterval(autoClear, 60000);
    }

    function login(){
      const u = document.getElementById("username").value.trim().toUpperCase();
      const p = document.getElementById("password").value.trim();
      if(USERS[u] && USERS[u] === p){ currentUser = u; sessionStorage.setItem("akaUrUser", u); showApp(); }
      else document.getElementById("loginErr").textContent = "गलत username या password";
    }
    function showApp(){ document.getElementById("loginScreen").style.display="none"; document.getElementById("app").style.display="grid"; document.getElementById("me").textContent=currentUser; watchMessages(); }
    function logout(){ sessionStorage.removeItem("akaUrUser"); location.reload(); }

    function localKey(){ return path() + "/messages"; }
    function getLocalMessages(){ try{return JSON.parse(localStorage.getItem(localKey()) || "[]");}catch(e){return [];} }
    function setLocalMessages(arr){ localStorage.setItem(localKey(), JSON.stringify(arr)); }

    function watchMessages(){
      const box = document.getElementById("messages");
      if(!firebaseOK){ renderMessages(getLocalMessages()); return; }
      if(currentRef && currentListener) currentRef.off("value", currentListener);
      currentRef = db.ref(path()+"/messages");
      currentListener = snap => {
        const val = snap.val() || {};
        const msgs = Object.entries(val).map(([id,m]) => ({id,...m})).sort((a,b)=>(a.time||0)-(b.time||0));
        renderMessages(msgs);
      };
      currentRef.on("value", currentListener, err => { setStatus("Database rules/config error", "bad"); box.innerHTML='<div class="empty">Firebase Database rules check करें.</div>'; console.error(err); });
    }

    function renderMessages(msgs){
      const box = document.getElementById("messages");
      if(!msgs.length){ box.innerHTML = '<div class="empty">♡ अभी कोई मैसेज नहीं है<br>पहला प्यार भरा मैसेज भेजें...</div>'; return; }
      box.innerHTML = msgs.map(m => {
        const mine = m.user === currentUser;
        let content = "";
        if(m.text) content += escapeHtml(m.text);
        if(m.image) content += `<img src="${m.image}" alt="sent image">`;
        if(m.audio) content += `<audio controls src="${m.audio}"></audio>`;
        return `<div class="msg ${mine?'mine':'theirs'}"><div class="bubble">${content}</div><div class="meta">${escapeHtml(m.user||'')} • ${new Date(m.time||Date.now()).toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'})}</div></div>`;
      }).join("");
      box.scrollTop = box.scrollHeight;
    }

    async function sendMessage(){
      const textEl = document.getElementById("text");
      const text = textEl.value.trim();
      if(!text && !imageData && !audioData) return;
      const msg = {user:currentUser, text, image:imageData, audio:audioData, time:Date.now()};
      document.getElementById("sendBtn").disabled = true;
      try{
        if(firebaseOK) await db.ref(path()+"/messages").push(msg);
        else { const arr = getLocalMessages(); arr.push({...msg,id:String(Date.now())}); setLocalMessages(arr); renderMessages(arr); }
        textEl.value=""; document.getElementById("count").textContent="0"; imageData=""; audioData=""; document.getElementById("picked").textContent=""; document.getElementById("imageInput").value="";
      }catch(e){ alert("Message send नहीं हुआ. Firebase config/rules check करें."); console.error(e); }
      finally{ document.getElementById("sendBtn").disabled = false; }
    }

    async function manualClear(){
      if(!confirm("इस date की chat clear करनी है?")) return;
      if(firebaseOK) await db.ref(path()).remove();
      else { localStorage.removeItem(localKey()); renderMessages([]); }
    }
    async function autoClear(){
      if(!firebaseOK) return;
      const meta = db.ref("akaUrChatMeta/lastClear");
      const snap = await meta.get();
      const last = Number(snap.val() || 0);
      if(Date.now() - last >= 30*60*1000){ await db.ref("akaUrChat/" + today()).remove(); await meta.set(Date.now()); }
    }
    function toggleEmoji(){ const p=document.getElementById("emojiPanel"); p.style.display = p.style.display === "block" ? "none" : "block"; }
    function addEmoji(e){ const t=document.getElementById("text"); t.value += e; t.focus(); document.getElementById("count").textContent = t.value.length; }
    function pickImage(ev){
      const f = ev.target.files[0]; if(!f) return;
      if(f.size > 900000){ alert("Image 900KB से कम रखें."); ev.target.value=""; return; }
      const r = new FileReader(); r.onload = () => { imageData = r.result; document.getElementById("picked").textContent = "Image ready ✓"; }; r.readAsDataURL(f);
    }
    async function toggleRecording(){
      const btn = document.getElementById("voiceBtn");
      if(mediaRecorder && mediaRecorder.state === "recording"){ mediaRecorder.stop(); btn.textContent="🎙️"; return; }
      try{
        const stream = await navigator.mediaDevices.getUserMedia({audio:true});
        audioChunks=[]; mediaRecorder = new MediaRecorder(stream);
        mediaRecorder.ondataavailable = e => audioChunks.push(e.data);
        mediaRecorder.onstop = () => {
          const blob = new Blob(audioChunks, {type:"audio/webm"});
          if(blob.size > 900000){ alert("Voice छोटा रखें, 900KB से कम."); stream.getTracks().forEach(t=>t.stop()); return; }
          const r = new FileReader(); r.onload = () => { audioData = r.result; document.getElementById("picked").textContent = "Voice ready ✓"; }; r.readAsDataURL(blob);
          stream.getTracks().forEach(t=>t.stop());
        };
        mediaRecorder.start(); btn.textContent="⏹️";
      }catch(e){ alert("Mic permission allow करें. Recording HTTPS पर चलेगी."); }
    }
    init();
  </script>
</body>
</html>
