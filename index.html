<!DOCTYPE html>
<html lang="hi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Over Space - M & U Chat</title>
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      min-height: 100dvh;
      font-family: Arial, Helvetica, sans-serif;
      background: radial-gradient(circle at top, #1b1b1b, #050505 65%);
      color: #fff;
      overflow: hidden;
    }
    .center {
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 18px;
    }
    .login-card {
      width: min(420px, 94vw);
      background: linear-gradient(145deg, #111, #050505);
      border: 1px solid #444;
      border-radius: 28px;
      padding: 34px 28px;
      box-shadow: 0 25px 60px rgba(0,0,0,.85), inset 0 0 25px rgba(255,255,255,.04);
      transform-style: preserve-3d;
      transition: .35s;
    }
    .login-card:hover {
      transform: perspective(900px) rotateX(5deg) rotateY(-5deg) translateY(-8px);
      box-shadow: 0 35px 80px rgba(255,255,255,.12), 0 20px 70px rgba(0,0,0,.9);
    }
    h1 { text-align:center; letter-spacing: 4px; margin: 0 0 25px; font-size: 34px; }
    label { display:block; margin: 14px 0 7px; color:#ddd; }
    input, button {
      width: 100%; border: 0; outline: 0; border-radius: 16px; font-size: 16px;
    }
    input {
      padding: 15px 16px; color:#fff; background:#111; border:1px solid #555;
      box-shadow: inset 0 0 14px rgba(0,0,0,.7);
    }
    input:focus { border-color:#fff; box-shadow: 0 0 18px rgba(255,255,255,.18); }
    button {
      margin-top: 22px; padding: 15px; cursor:pointer; color:#000; font-weight:800;
      background: linear-gradient(145deg, #fff, #bfbfbf);
      box-shadow: 0 10px 0 #777, 0 22px 35px rgba(0,0,0,.65);
      transition:.18s;
    }
    button:hover { transform: translateY(-3px); filter: brightness(1.15); }
    button:active { transform: translateY(7px); box-shadow: 0 3px 0 #777; }
    .hint { text-align:center; color:#aaa; font-size:13px; margin-top:13px; }
    .error { min-height:20px; color:#ff8a8a; text-align:center; margin-top:12px; }
    .chat-app { display:none; height:100vh; height:100dvh; max-width:900px; margin:auto; background:#070707; border-left:1px solid #333; border-right:1px solid #333; font-size:13px; }
    .topbar {
      height:58px; display:flex; align-items:center; gap:9px; padding:7px 10px;
      background:linear-gradient(145deg,#000,#171717); border-bottom:1px solid #333;
      box-shadow:0 8px 20px rgba(0,0,0,.7); position:relative; z-index:2;
    }
    .avatar {
      width:38px; height:38px; border-radius:50%; background:#222; border:2px solid #fff;
      overflow:hidden; display:flex; align-items:center; justify-content:center; font-weight:900;
    }
    .avatar img { width:100%; height:100%; object-fit:cover; }
    .who { flex:1; }
    .who b { font-size:15px; }
    .who small { display:block; color:#aaa; margin-top:1px; font-size:11px; }
    .profile-btn, .logout-btn {
      width:auto; margin:0; padding:8px 9px; border-radius:12px; box-shadow:none; font-size:11px;
    }
    #profileInput { display:none; }
    .messages {
      height: calc(100vh - 118px); height: calc(100dvh - 118px); overflow-y:auto; padding:10px 8px 16px;
      background:
        radial-gradient(circle at 20% 20%, rgba(255,255,255,.035), transparent 26%),
        radial-gradient(circle at 85% 70%, rgba(255,255,255,.028), transparent 25%), #050505;
    }
    .msg-row { display:flex; margin:6px 0; animation: pop .22s ease; }
    .msg-row.me { justify-content:flex-end; }
    .bubble {
      max-width:76%; padding:7px 9px 5px; border-radius:15px; font-size:12px; line-height:1.25; word-wrap:break-word;
      box-shadow: 0 7px 16px rgba(0,0,0,.45); position:relative;
    }
    .me .bubble { background:#156dff; border-bottom-right-radius:5px; }
    .other .bubble { background:#8ecbff; color:#001a32; border-bottom-left-radius:5px; }
    .name { font-size:10px; font-weight:900; opacity:.8; margin-bottom:2px; }
    .time { display:block; font-size:9px; opacity:.78; text-align:right; margin-top:3px; }
    @keyframes pop { from { transform:scale(.92); opacity:0; } to { transform:scale(1); opacity:1; } }
    .composer {
      height:60px; display:flex; align-items:center; gap:6px; padding:8px; background:#0d0d0d; border-top:1px solid #333;
    }
    .round {
      width:38px; min-width:38px; height:38px; margin:0; border-radius:50%; padding:0; font-size:20px; box-shadow:none;
      display:flex; align-items:center; justify-content:center;
    }
    #messageInput { flex:1; border-radius:20px; padding:11px 12px; font-size:13px; }
    .send {
      width:48px; min-width:48px; height:38px; margin:0; padding:0; border-radius:22px;
      background:linear-gradient(145deg,#dff1ff,#62a8ff); color:#001; box-shadow:0 0 18px rgba(98,168,255,.28);
    }
    .send:hover { box-shadow:0 0 28px rgba(98,168,255,.95); transform:scale(1.06); }
    .picker {
      position:absolute; bottom:78px; left:12px; width:min(390px,94vw); max-height:270px; overflow:auto;
      background:#111; border:1px solid #444; border-radius:22px; padding:12px; display:none;
      box-shadow:0 20px 45px rgba(0,0,0,.8); z-index:5;
    }
    .picker h3 { margin:8px 6px; font-size:14px; color:#ccc; }
    .item {
      display:inline-flex; align-items:center; justify-content:center; width:38px; height:38px; margin:4px;
      border-radius:12px; background:#1c1c1c; cursor:pointer; font-size:23px; transition:.15s;
    }
    .item:hover { transform:scale(1.18); background:#fff; color:#000; }
    .flower {
      position:fixed; top:50%; left:50%; pointer-events:none; font-size:22px; animation: blast 1s ease-out forwards; z-index:99;
    }
    @keyframes blast {
      to { transform: translate(var(--x), var(--y)) rotate(520deg) scale(.2); opacity:0; }
    }
    .hidden { display:none; }
    @media (max-width:600px) { .bubble{max-width:84%;} h1{font-size:28px;} }
    @media (max-width:420px) {
      .chat-app { max-width:100vw; border:0; font-size:12px; }
      .topbar { height:52px; gap:6px; padding:6px; }
      .avatar { width:32px; height:32px; font-size:12px; }
      .profile-btn, .logout-btn { padding:7px 7px; font-size:10px; }
      .messages { height: calc(100vh - 104px); height: calc(100dvh - 104px); padding:8px 6px 12px; }
      .composer { height:52px; padding:6px; }
      .round { width:34px; min-width:34px; height:34px; font-size:17px; }
      .send { width:42px; min-width:42px; height:34px; }
      #messageInput { font-size:12px; padding:9px 10px; }
      .bubble { font-size:11px; max-width:88%; }
    }
  </style>
</head>
<body>
  <div class="center" id="loginScreen">
    <div class="login-card">
      <h1>OVER SPACE</h1>
      <label>ID</label>
      <input id="userId" placeholder="" autocomplete="username" />
      <label>Password</label>
      <input id="password" type="password" placeholder="Password" autocomplete="current-password" />
      <button id="loginBtn">LOGIN</button>
      <div class="error" id="errorBox"></div>
      <div class="hint">M password: 2006 | U password: 2810</div>
    </div>
  </div>

  <div class="chat-app" id="chatApp">
    <div class="topbar">
      <div class="avatar" id="avatar">M</div>
      <div class="who"><b id="chatTitle">Chat</b><small id="statusText">online • WhatsApp style</small></div>
      <input type="file" id="profileInput" accept="image/*" />
      <button class="profile-btn" id="profileBtn">Profile Image</button>
      <button class="logout-btn" id="logoutBtn">Logout</button>
    </div>

    <div class="messages" id="messages"></div>

    <div class="picker" id="picker">
      <h3>Love Emojis</h3>
      <div id="emojiList"></div>
      <h3>Romantic Stickers</h3>
      <div id="stickerList"></div>
    </div>

    <div class="composer">
      <button class="round" id="emojiBtn">😊</button>
      <input id="messageInput" placeholder="Message type करें और Enter दबाएँ..." />
      <button class="send" id="sendBtn">➤</button>
    </div>
  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.5/firebase-app.js";
    import { getAnalytics } from "https://www.gstatic.com/firebasejs/10.12.5/firebase-analytics.js";
    import { getDatabase, ref, push, onChildAdded, onChildRemoved, onValue, set, get, query, limitToLast, serverTimestamp, remove, onDisconnect } from "https://www.gstatic.com/firebasejs/10.12.5/firebase-database.js";

    const firebaseConfig = {
      apiKey: "AIzaSyBqBTpPcUnoODy2uY3JaYZ79DVjzADJRQ4",
      authDomain: "akaur-e7f57.firebaseapp.com",
      databaseURL: "https://akaur-e7f57-default-rtdb.firebaseio.com",
      projectId: "akaur-e7f57",
      storageBucket: "akaur-e7f57.firebasestorage.app",
      messagingSenderId: "970506787698",
      appId: "1:970506787698:web:18fd5ae92be7e230fe5beb",
      measurementId: "G-8YFM3BXRPP"
    };

    const app = initializeApp(firebaseConfig);
    try { getAnalytics(app); } catch(e) { console.log('Analytics skipped:', e.message); }
    const db = getDatabase(app);

    const users = { m: '2006', u: '2810' };
    // sessionStorage browser/tab close hote hi clear ho jata hai, isliye auto logout ho jayega
    localStorage.removeItem('currentUser'); // purane saved login ko clear karein
    let currentUser = sessionStorage.getItem('currentUser') || '';
    let presenceDisconnectRef = null;
    const loginScreen = document.getElementById('loginScreen');
    const chatApp = document.getElementById('chatApp');
    const messages = document.getElementById('messages');
    const messageInput = document.getElementById('messageInput');
    const picker = document.getElementById('picker');
    const avatar = document.getElementById('avatar');
    const statusText = document.getElementById('statusText');

    const emojis = ['😍','😘','🥰','❤️','💕','💖','💘','💝','💞','💓','🌹','🫶','💌','💋','🤍','🖤','✨','🌙','🥺','🫰'];
    const stickers = ['🌹❤️','💑','🧸💖','💍✨','🌙💕','☕❤️','🎁💝','💌🪽','😘🌹','Forever ♡','Love You ❤️','Miss You 💕'];

    const chatRef = ref(db, 'overSpaceChat/messages');
    let loadedKeys = new Set();
    let listenerStarted = false;
    const CHAT_AUTO_DELETE_MS = 15 * 60 * 1000; // 15 minutes: messages older than this will be cleared

    function nowTime(){ return new Date().toLocaleTimeString([], {hour:'numeric', minute:'2-digit'}); }
    function otherUser(){ return currentUser === 'm' ? 'u' : 'm'; }

    async function setUserOnline(){
      if(!currentUser) return;
      const presenceRef = ref(db, 'overSpaceChat/presence/' + currentUser);
      presenceDisconnectRef = onDisconnect(presenceRef);
      await presenceDisconnectRef.set({ online:false, lastSeen: serverTimestamp() });
      await set(presenceRef, { online:true, lastSeen: serverTimestamp() });
    }

    async function setUserOffline(){
      if(!currentUser) return;
      const presenceRef = ref(db, 'overSpaceChat/presence/' + currentUser);
      try { if(presenceDisconnectRef) await presenceDisconnectRef.cancel(); } catch(e) {}
      await set(presenceRef, { online:false, lastSeen: serverTimestamp() });
    }

    function clearLoginSession(){
      sessionStorage.removeItem('currentUser');
      localStorage.removeItem('currentUser');
    }

    async function login(){
      const id = document.getElementById('userId').value.trim().toLowerCase();
      const pass = document.getElementById('password').value.trim();
      if (users[id] && users[id] === pass) {
        currentUser = id;
        sessionStorage.setItem('currentUser', currentUser);
        await setUserOnline();
        flowerBlast();
        setTimeout(showChat, 350);
      } else {
        document.getElementById('errorBox').textContent = 'गलत ID या Password';
      }
    }

    function showChat(){
      loginScreen.style.display = 'none';
      chatApp.style.display = 'block';
      document.getElementById('chatTitle').textContent = currentUser.toUpperCase() + ' ↔ ' + otherUser().toUpperCase();
      statusText.textContent = 'online chat • messages auto-delete after 15 minutes';
      loadAvatar();
      startRealtimeChat();
      messageInput.focus();
    }

    async function startRealtimeChat(){
      if(listenerStarted) return;
      listenerStarted = true;
      messages.innerHTML = '';
      loadedKeys.clear();
      await cleanupOldMessages();
      setInterval(cleanupOldMessages, 10000);

      const recentChat = query(chatRef, limitToLast(300));

      onChildAdded(recentChat, snap => {
        if(loadedKeys.has(snap.key)) return;
        loadedKeys.add(snap.key);
        const msg = snap.val() || {};
        const createdAt = Number(msg.createdAt || msg.clientAt || Date.now());

        // Per-message delete timer hata diya hai. Sirf global 15-minute cleanup chalega.
        if(createdAt && Date.now() - createdAt >= CHAT_AUTO_DELETE_MS) {
          remove(ref(db, 'overSpaceChat/messages/' + snap.key));
          return;
        }

        addMessage(msg, snap.key);
      }, error => {
        console.error('Chat receive error:', error);
        statusText.textContent = 'Firebase rules/connection problem';
      });

      onChildRemoved(chatRef, snap => {
        const row = messages.querySelector(`[data-key="${snap.key}"]`);
        if(row) row.remove();
        loadedKeys.delete(snap.key);
      });
    }

    async function cleanupOldMessages(){
      try {
        const snap = await get(chatRef);
        if(!snap.exists()) return;
        const now = Date.now();
        snap.forEach(child => {
          const msg = child.val() || {};
          const createdAt = Number(msg.createdAt || msg.clientAt || 0);
          if(createdAt && now - createdAt >= CHAT_AUTO_DELETE_MS) {
            remove(ref(db, 'overSpaceChat/messages/' + child.key));
          }
        });
      } catch(error) {
        console.error('Chat cleanup error:', error);
      }
    }

    function addMessage(m, key){
      if(!m || !m.user || typeof m.text === 'undefined') return;
      const row = document.createElement('div');
      row.className = 'msg-row ' + (m.user === currentUser ? 'me' : 'other');
      if(key) row.dataset.key = key;

      const bubble = document.createElement('div');
      bubble.className = 'bubble';

      const name = document.createElement('div');
      name.className = 'name';
      name.textContent = String(m.user || '').toUpperCase();

      const textNode = document.createTextNode(String(m.text || ''));

      const time = document.createElement('span');
      time.className = 'time';
      time.textContent = String(m.time || '');

      bubble.appendChild(name);
      bubble.appendChild(textNode);
      bubble.appendChild(time);
      row.appendChild(bubble);
      messages.appendChild(row);
      messages.scrollTop = messages.scrollHeight;
    }

    async function sendMessage(){
      const text = messageInput.value.trim();
      if(!text || !currentUser) return;
      messageInput.value = '';
      picker.style.display = 'none';
      try {
        await push(chatRef, { user: currentUser, text, time: nowTime(), createdAt: serverTimestamp(), clientAt: Date.now() });
        flashSend();
      } catch (error) {
        console.error('Message send error:', error);
        alert('Message send nahi hua. Firebase Realtime Database rules/check connection dekhein.');
        messageInput.value = text;
      }
    }

    function escapeHtml(str){
      return str.replace(/[&<>'"]/g, t => ({'&':'&amp;','<':'&lt;','>':'&gt;',"'":'&#39;','"':'&quot;'}[t]));
    }

    function makePicker(){
      document.getElementById('emojiList').innerHTML = emojis.map(e => `<span class="item">${e}</span>`).join('');
      document.getElementById('stickerList').innerHTML = stickers.map(e => `<span class="item">${e}</span>`).join('');
      picker.addEventListener('click', e => {
        if(e.target.classList.contains('item')) {
          messageInput.value += e.target.textContent;
          picker.style.display = 'none';
          messageInput.focus();
        }
      });

      document.addEventListener('click', e => {
        const clickedEmojiButton = e.target.closest('#emojiBtn');
        const clickedPicker = e.target.closest('#picker');
        if(!clickedEmojiButton && !clickedPicker) picker.style.display = 'none';
      });
    }

    function flashSend(){
      const btn = document.getElementById('sendBtn');
      btn.style.filter = 'brightness(1.8)';
      setTimeout(()=> btn.style.filter = '', 180);
    }

    function flowerBlast(){
      for(let i=0; i<32; i++){
        const f = document.createElement('div');
        f.className='flower';
        f.textContent = ['🌸','🌹','💮','🌺','💖'][Math.floor(Math.random()*5)];
        f.style.setProperty('--x', (Math.random()*520-260)+'px');
        f.style.setProperty('--y', (Math.random()*520-260)+'px');
        document.body.appendChild(f);
        setTimeout(()=>f.remove(), 1000);
      }
    }

    function loadAvatar(){
      onValue(ref(db, 'overSpaceChat/avatars/' + currentUser), snap => {
        const img = snap.val();
        if(img) avatar.innerHTML = `<img src="${img}" alt="profile">`;
        else avatar.textContent = currentUser.toUpperCase();
      });
    }

    document.getElementById('loginBtn').onclick = login;
    document.getElementById('password').addEventListener('keydown', e => { if(e.key==='Enter') login(); });
    document.getElementById('userId').addEventListener('keydown', e => { if(e.key==='Enter') login(); });
    document.getElementById('sendBtn').onclick = sendMessage;
    messageInput.addEventListener('keydown', e => { if(e.key==='Enter') sendMessage(); });
    document.getElementById('emojiBtn').onclick = e => {
      e.stopPropagation();
      picker.style.display = picker.style.display === 'block' ? 'none' : 'block';
    };
    document.getElementById('logoutBtn').onclick = async () => {
      await setUserOffline();
      clearLoginSession();
      location.reload();
    };
    document.getElementById('profileBtn').onclick = () => document.getElementById('profileInput').click();
    document.getElementById('profileInput').addEventListener('change', e => {
      const file = e.target.files[0];
      if(!file) return;
      if(file.size > 700000) { alert('Profile image 700KB से छोटी रखें।'); return; }
      const reader = new FileReader();
      reader.onload = async () => await set(ref(db, 'overSpaceChat/avatars/' + currentUser), reader.result);
      reader.readAsDataURL(file);
    });

    window.addEventListener('beforeunload', () => {
      // Browser/tab close ya refresh par saved login clear ho jayega.
      // Firebase onDisconnect presence ko offline mark karega.
      clearLoginSession();
    });

    makePicker();
    if(currentUser && users[currentUser]) { setUserOnline().then(showChat); }
  </script>
</body>
</html>
